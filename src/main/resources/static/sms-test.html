<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>SMS 인증 테스트</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/sms-test.css">
</head>
<body>
<div class="container">
    <header class="page-header">
        <h1>SMS 인증 테스트</h1>
        <p class="description">
            휴대폰 인증번호 발송 / 인증번호 검증 / 인증 상태 조회 기능을<br>
            테스트할 수 있는 페이지입니다.
        </p>

<!--        <details class="guide-toggle">
            <summary>테스트 순서 예시</summary>
            <div class="guide-content">
                1) 휴대폰 번호 입력 후 인증번호 전송<br>
                2) 문자로 받은 인증번호 입력 후 인증 확인<br>
                3) 인증 상태 조회로 인증 완료 여부 확인
            </div>
        </details>-->
    </header>

    <main class="content-layout">
        <section class="left-panel">
            <div class="section">
                <h2>인증번호 요청</h2>
                <label for="phoneNumber">휴대폰 번호</label>
                <input
                        type="text"
                        id="phoneNumber"
                        placeholder="01012345678 또는 010-1234-5678"
                        maxlength="13"
                >

                <div class="button-row">
                    <button id="sendButton" type="button">인증번호 전송</button>
                    <button id="availabilityButton" class="secondary" type="button">남은 횟수 조회</button>
                </div>

                <div id="timer" class="timer">남은 시간 03:00</div>
                <div id="sendCountInfo" class="hint">남은 발송 가능 횟수: -</div>
                <div id="expireInfo" class="hint">인증번호 유효 시간: -초</div>
            </div>

            <div class="section">
                <h2>인증번호 검증</h2>
                <label for="verificationCode">인증번호</label>
                <input
                        type="text"
                        id="verificationCode"
                        placeholder="6자리 인증번호 입력"
                        maxlength="6"
                >

                <div class="button-row">
                    <button id="verifyButton" type="button">인증 확인</button>
                </div>
            </div>

            <div class="section">
                <h2>인증 상태 확인</h2>
                <div class="button-row">
                    <button id="statusButton" class="secondary" type="button">인증 상태 조회</button>
                    <button id="clearButton" class="secondary" type="button">결과 초기화</button>
                </div>
            </div>
        </section>

        <aside class="right-panel">
            <div class="result-wrapper">
                <h2 class="result-title">결과</h2>
                <div id="result" class="result info">결과가 여기에 표시됩니다.</div>
            </div>
        </aside>
    </main>
</div>

<script src="/js/sms-test.js"></script>
</body>
</html>
